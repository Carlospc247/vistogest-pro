{% extends 'base_auth.html' %}
{% block title %}Recuperar Senha - VistoGEST{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="text-center text-2xl">
        <span class="text-blue-800 font-bold">Recuperar</span> <span class="text-orange-600 font-bold">Acesso</span>
        <p class="text-sm text-gray-600">Insira o seu e-mail cadastrado para receber as instruções.</p>
    </div>
    <div class="mx-auto mt-3 mb-6 w-40 border-b-4 border-orange-500 rounded-full"></div>

    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">
                <i class="fas fa-envelope mr-1"></i>E-mail Institucional
            </label>
            <input type="email" 
                   name="email" 
                   id="id_email"
                   class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                   placeholder="exemplo@empresa.com"
                   required>
        </div>

        <button type="submit" 
                class="btn-primary w-full py-3 px-4 text-white font-medium rounded-lg shadow-md hover:bg-primary-dark transition-all">
            <i class="fas fa-paper-plane mr-2"></i>Enviar Link de Resgate
        </button>
    </form>

    <div class="text-center">
        <p class="text-sm text-gray-600">
            Lembrou a senha? 
            <a href="{% url 'core:login' %}" class="text-primary hover:text-primary-dark font-medium">Voltar para o login</a>
        </p>
    </div>
</div>
{% endblock %}
