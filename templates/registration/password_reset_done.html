{% extends 'base_auth.html' %}
{% block title %}E-mail Enviado - VistoGEST{% endblock %}

{% block content %}
<div class="text-center space-y-6">
    <div class="flex justify-center">
        <div class="bg-green-100 p-4 rounded-full">
            <i class="fas fa-paper-plane text-3xl text-green-600"></i>
        </div>
    </div>
    <div class="text-2xl font-bold text-blue-800">Verifique seu <span class="text-orange-600">E-mail</span></div>
    <p class="text-gray-600 text-sm px-4">
        Enviamos as instruções para recuperar a sua senha. Se o e-mail existir no nosso sistema, o link chegará em instantes.
    </p>
    <div class="pt-4">
        <a href="{% url 'core:login' %}" class="btn-primary inline-block w-full py-3 text-white font-medium rounded-lg">
            Voltar ao Início
        </a>
    </div>
</div>
{% endblock %}
