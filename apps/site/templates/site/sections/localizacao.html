<section class="py-5 bg-light">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-5 mb-4 mb-lg-0">
                <h2 class="fw-bold">{{ dados.titulo_mapa }}</h2>
                <p class="lead text-muted"><i class="fas fa-map-marker-alt me-2 text-primary"></i> {{ dados.endereco_texto }}</p>
                {% if dados.mostrar_info_contato %}
                <div class="mt-4 p-3 border-start border-primary border-4 bg-white shadow-sm">
                    <p class="mb-1 small fw-bold text-uppercase">Atendimento Presencial</p>
                    <p class="mb-0">Segunda à Sexta: 08h - 18h</p>
                </div>
                {% endif %}
            </div>
            <div class="col-lg-7">
                <div class="rounded-3 overflow-hidden shadow-lg">
                    <iframe src="{{ dados.iframe_url }}" width="100%" height="{{ dados.altura_mapa|default:400 }}" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </div>
</section>
